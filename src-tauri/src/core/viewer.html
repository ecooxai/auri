<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Auri Files</title>
<style>
  :root { --bg:#101318; --panel:#181c24; --line:#262c38; --text:#e8ecf4; --dim:#9aa6ba; --accent:#7089f8; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,system-ui,"Segoe UI",sans-serif; }
  header { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--line); background:var(--panel); position:sticky; top:0; z-index:5; flex-wrap:wrap; }
  header h1 { margin:0; font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:46vw; }
  .badge { font-size:11px; color:var(--dim); border:1px solid var(--line); border-radius:20px; padding:1px 9px; text-transform:uppercase; letter-spacing:.5px; }
  .spacer { flex:1; }
  button,a.btn { appearance:none; border:1px solid var(--line); background:#202634; color:var(--text); border-radius:8px; padding:7px 13px; font:inherit; font-size:13px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; touch-action:manipulation; }
  button:hover,a.btn:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#0c1020; font-weight:600; }
  main { height:calc(100% - 55px); overflow:auto; -webkit-overflow-scrolling:touch; }
  .stage { display:flex; align-items:center; justify-content:center; min-height:100%; padding:14px; }
  img.preview { max-width:100%; max-height:82vh; border-radius:10px; box-shadow:0 12px 40px rgba(0,0,0,.5); transition:transform .15s ease; }
  video,audio { max-width:100%; outline:none; }
  video { max-height:82vh; border-radius:10px; }
  iframe { border:0; width:100%; height:calc(100vh - 56px); background:#fff; }
  textarea.editor { width:100%; height:calc(100vh - 120px); background:#0c0f14; color:#dbe3f0; border:1px solid var(--line); border-radius:10px; padding:14px; font:13px/1.6 ui-monospace,Menlo,Consolas,monospace; resize:none; outline:none; white-space:pre; }
  .toolbar { display:flex; gap:8px; padding:10px 14px; flex-wrap:wrap; align-items:center; }
  .toolbar label { color:var(--dim); font-size:12px; display:flex; gap:6px; align-items:center; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; padding:14px; }
  .cell { border:1px solid var(--line); background:var(--panel); border-radius:12px; padding:14px 12px; cursor:pointer; text-align:center; overflow:hidden; }
  .cell:hover { border-color:var(--accent); }
  .cell span { font-size:26px; display:block; margin-bottom:6px; }
  .cell strong { font-weight:500; font-size:12.5px; word-break:break-all; display:block; }
  .cell small { color:var(--dim); font-size:11px; }
  .note { color:var(--dim); text-align:center; padding:40px 20px; }
  #three-host { width:100%; height:calc(100vh - 56px); touch-action:none; }
  .crumbs { font-size:12.5px; color:var(--dim); width:100%; }
  .crumbs a { color:var(--accent); text-decoration:none; cursor:pointer; }
  @media (max-width:640px){ header h1{max-width:100%;} }
</style>
</head>
<body>
<header>
  <h1 id="title">Files</h1>
  <span class="badge" id="kind">folder</span>
  <div class="spacer"></div>
  <div id="actions" style="display:flex;gap:8px;flex-wrap:wrap"></div>
</header>
<main id="main"><div class="note">Loading…</div></main>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  const file = params.get("file") || "";
  const dir = params.get("dir") || "";
  const main = document.getElementById("main");
  const titleEl = document.getElementById("title");
  const kindEl = document.getElementById("kind");
  const actionsEl = document.getElementById("actions");
  const rawUrl = (path) => "/raw/" + path.split("/").map(encodeURIComponent).join("/");
  const esc = (v) => String(v).replace(/[&<>"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const name = file.split("/").pop() || "Files";
  const ext = (name.includes(".") ? name.split(".").pop() : "").toLowerCase();
  const kinds = {
    image: ["png","jpg","jpeg","webp","gif","bmp","svg","avif","ico","tif","tiff"],
    audio: ["mp3","m4a","wav","ogg","flac","aac","opus"],
    video: ["mp4","mov","webm","mkv","m4v","avi"],
    pdf: ["pdf"],
    model: ["glb","gltf","obj","stl"],
    html: ["html","htm"],
    text: ["txt","md","json","js","mjs","ts","tsx","jsx","rs","toml","yaml","yml","css","sh","py","xml","csv","log","ini","conf","c","h","cpp","go","java","rb","php","sql","vue","svelte"]
  };
  const kindOf = () => Object.keys(kinds).find((key) => kinds[key].includes(ext)) || "file";
  const setActions = (buttons) => {
    actionsEl.innerHTML = "";
    for (const item of buttons) {
      if (item.href) {
        const a = document.createElement("a");
        a.className = "btn"; a.textContent = item.label; a.href = item.href;
        if (item.download) a.download = item.download;
        actionsEl.appendChild(a);
      } else {
        const b = document.createElement("button");
        if (item.primary) b.className = "primary";
        b.textContent = item.label; b.addEventListener("click", item.onClick);
        actionsEl.appendChild(b);
      }
    }
  };
  const toast = (message, ok = true) => {
    const el = document.createElement("div");
    el.textContent = message;
    el.setAttribute("style", "position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:" + (ok ? "#1f9d61" : "#c0455a") + ";color:#fff;padding:9px 18px;border-radius:20px;z-index:30;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4)");
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2400);
  };
  const post = async (route, path, body) => {
    const response = await fetch(route + "?file=" + encodeURIComponent(path), { method: "POST", body });
    const data = await response.json().catch(() => ({}));
    if (!response.ok || data.error) throw new Error(data.error || "Save failed.");
  };

  async function renderFolder(path) {
    titleEl.textContent = path ? path.split("/").pop() : "Files";
    kindEl.textContent = "folder";
    const response = await fetch("/api/list?path=" + encodeURIComponent(path));
    const entries = await response.json();
    const icons = { directory:"📁", image:"🖼", audio:"🎵", video:"🎬", text:"📄", file:"📦" };
    const crumbs = ['<a data-dir="">⌂</a>'];
    let acc = "";
    for (const part of path.split("/").filter(Boolean)) {
      acc = acc ? acc + "/" + part : part;
      crumbs.push('<a data-dir="' + esc(acc) + '">' + esc(part) + "</a>");
    }
    main.innerHTML = '<div class="toolbar crumbs">' + crumbs.join(" / ") + "</div>" +
      '<div class="grid">' + (entries.length ? entries.map((entry) => {
        const full = path ? path + "/" + entry.name : entry.name;
        return '<div class="cell" data-kind="' + esc(entry.kind) + '" data-path="' + esc(full) + '">' +
          "<span>" + (icons[entry.kind] || icons.file) + "</span><strong>" + esc(entry.name) + "</strong>" +
          (entry.kind === "directory" ? "" : "<small>" + (entry.size > 1048576 ? (entry.size / 1048576).toFixed(1) + " MB" : Math.max(1, Math.round(entry.size / 1024)) + " KB") + "</small>") + "</div>";
      }).join("") : '<div class="note">This folder is empty.</div>') + "</div>";
    main.querySelectorAll(".cell").forEach((cell) => cell.addEventListener("click", () => {
      const target = cell.dataset.path;
      if (cell.dataset.kind === "directory") location.search = "?dir=" + encodeURIComponent(target);
      else location.search = "?file=" + encodeURIComponent(target);
    }));
    main.querySelectorAll(".crumbs a").forEach((link) => link.addEventListener("click", () => {
      location.search = "?dir=" + encodeURIComponent(link.dataset.dir || "");
    }));
    setActions([]);
  }

  function renderImage() {
    let rotation = 0, flip = 1;
    main.innerHTML = '<div class="stage"><img class="preview" id="image" src="' + rawUrl(file) + '" alt=""></div>';
    const image = document.getElementById("image");
    const apply = () => { image.style.transform = "rotate(" + rotation + "deg) scaleX(" + flip + ")"; };
    setActions([
      { label: "⟲ Rotate", onClick: () => { rotation = (rotation + 270) % 360; apply(); } },
      { label: "⟳ Rotate", onClick: () => { rotation = (rotation + 90) % 360; apply(); } },
      { label: "⇋ Flip", onClick: () => { flip *= -1; apply(); } },
      { label: "Save copy", primary: true, onClick: async () => {
        try {
          const bitmap = await createImageBitmap(await (await fetch(rawUrl(file))).blob());
          const rotated = rotation % 180 !== 0;
          const canvas = document.createElement("canvas");
          canvas.width = rotated ? bitmap.height : bitmap.width;
          canvas.height = rotated ? bitmap.width : bitmap.height;
          const context = canvas.getContext("2d");
          context.translate(canvas.width / 2, canvas.height / 2);
          context.rotate(rotation * Math.PI / 180);
          context.scale(flip, 1);
          context.drawImage(bitmap, -bitmap.width / 2, -bitmap.height / 2);
          const base64 = canvas.toDataURL("image/png").split(",")[1];
          const target = file.replace(/\.[^.]+$/, "") + "-edited.png";
          await post("/api/save-b64", target, base64);
          toast("Saved " + target.split("/").pop());
        } catch (error) { toast(error.message || "Could not save the image.", false); }
      } },
      { label: "Download", href: rawUrl(file), download: name }
    ]);
  }

  function renderMedia(tag) {
    main.innerHTML = '<div class="stage" style="flex-direction:column;gap:14px"><' + tag + ' controls autoplay playsinline src="' + rawUrl(file) + '" id="media"></' + tag + '>' +
      '<div class="toolbar"><label>Speed <select id="rate"><option>0.5</option><option>0.75</option><option selected>1</option><option>1.25</option><option>1.5</option><option>2</option></select></label>' +
      '<button id="back10">−10s</button><button id="fwd10">+10s</button></div></div>';
    const media = document.getElementById("media");
    document.getElementById("rate").addEventListener("change", (event) => { media.playbackRate = Number(event.target.value); });
    document.getElementById("back10").addEventListener("click", () => { media.currentTime = Math.max(0, media.currentTime - 10); });
    document.getElementById("fwd10").addEventListener("click", () => { media.currentTime += 10; });
    setActions([{ label: "Download", href: rawUrl(file), download: name }]);
  }

  function renderPdf() {
    main.innerHTML = '<iframe src="' + rawUrl(file) + '"></iframe>';
    setActions([{ label: "Download", href: rawUrl(file), download: name }]);
  }

  async function renderText() {
    const content = await (await fetch(rawUrl(file))).text();
    main.innerHTML = '<div class="toolbar" style="padding-bottom:0"><span class="crumbs">' + esc(file) + '</span></div><div style="padding:0 14px 14px"><textarea class="editor" id="editor" spellcheck="false"></textarea></div>';
    const editor = document.getElementById("editor");
    editor.value = content;
    setActions([
      { label: "Save", primary: true, onClick: async () => {
        try { await post("/api/save", file, editor.value); toast("Saved"); }
        catch (error) { toast(error.message, false); }
      } },
      { label: "Download", href: rawUrl(file), download: name }
    ]);
    document.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "s") {
        event.preventDefault();
        post("/api/save", file, editor.value).then(() => toast("Saved")).catch((error) => toast(error.message, false));
      }
    });
  }

  function renderHtml() {
    let mode = "preview";
    const draw = async () => {
      if (mode === "preview") {
        main.innerHTML = '<iframe src="' + rawUrl(file) + '"></iframe>';
      } else {
        const content = await (await fetch(rawUrl(file))).text();
        main.innerHTML = '<div style="padding:14px"><textarea class="editor" id="editor" spellcheck="false"></textarea></div>';
        document.getElementById("editor").value = content;
      }
      setActions([
        { label: mode === "preview" ? "Edit source" : "Preview", onClick: () => { mode = mode === "preview" ? "source" : "preview"; draw(); } },
        ...(mode === "source" ? [{ label: "Save", primary: true, onClick: async () => {
          try { await post("/api/save", file, document.getElementById("editor").value); toast("Saved"); }
          catch (error) { toast(error.message, false); }
        } }] : []),
        { label: "Open page", href: rawUrl(file) }
      ]);
    };
    draw();
  }

  async function renderModel() {
    main.innerHTML = '<div id="three-host"></div>';
    setActions([{ label: "Download", href: rawUrl(file), download: name }]);
    try {
      const { THREE, OrbitControls, GLTFLoader, OBJLoader, STLLoader } = await import("/three-viewer.js");
      const host = document.getElementById("three-host");
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
      renderer.setSize(host.clientWidth, host.clientHeight);
      host.appendChild(renderer.domElement);
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x14181f);
      const camera = new THREE.PerspectiveCamera(50, host.clientWidth / host.clientHeight, 0.01, 2000);
      camera.position.set(2.4, 1.6, 3);
      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      const sun = new THREE.DirectionalLight(0xffffff, 1.4);
      sun.position.set(4, 8, 5);
      scene.add(sun);
      scene.add(new THREE.GridHelper(10, 20, 0x2a3242, 0x1d232e));
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      const url = rawUrl(file);
      const frame = (object) => {
        const box = new THREE.Box3().setFromObject(object);
        const size = box.getSize(new THREE.Vector3()).length() || 1;
        const center = box.getCenter(new THREE.Vector3());
        object.position.sub(center);
        camera.position.set(size * 0.9, size * 0.6, size * 1.1);
        controls.target.set(0, 0, 0);
        scene.add(object);
      };
      if (ext === "glb" || ext === "gltf") {
        const gltf = await new GLTFLoader().loadAsync(url);
        frame(gltf.scene);
      } else if (ext === "obj") {
        const object = await new OBJLoader().loadAsync(url);
        object.traverse((node) => { if (node.isMesh && !node.material) node.material = new THREE.MeshStandardMaterial({ color: 0x8fa3c8 }); });
        frame(object);
      } else if (ext === "stl") {
        const geometry = await new STLLoader().loadAsync(url);
        frame(new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: 0x8fa3c8, metalness: 0.1, roughness: 0.6 })));
      }
      const resize = () => {
        camera.aspect = host.clientWidth / host.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(host.clientWidth, host.clientHeight);
      };
      window.addEventListener("resize", resize);
      renderer.setAnimationLoop(() => { controls.update(); renderer.render(scene, camera); });
    } catch (error) {
      main.innerHTML = '<div class="note">Could not render this 3D model.<br>' + esc(error.message || "") + '<br><br><a class="btn" href="' + rawUrl(file) + '" download>Download the model instead</a></div>';
    }
  }

  function renderFallback() {
    main.innerHTML = '<div class="note">No inline preview for “.' + esc(ext) + '” files.<br><br><a class="btn" href="' + rawUrl(file) + '" download="' + esc(name) + '">Download ' + esc(name) + "</a></div>";
    setActions([]);
  }

  if (!file) { renderFolder(dir); return; }
  titleEl.textContent = name;
  const kind = kindOf();
  kindEl.textContent = kind;
  document.title = name + " — Auri Files";
  if (kind === "image") renderImage();
  else if (kind === "audio") renderMedia("audio");
  else if (kind === "video") renderMedia("video");
  else if (kind === "pdf") renderPdf();
  else if (kind === "model") renderModel();
  else if (kind === "html") renderHtml();
  else if (kind === "text") renderText();
  else renderFallback();
})();
</script>
</body>
</html>
