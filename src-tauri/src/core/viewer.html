<!doctype html>
<html lang="en">
<head>

<style>
:root{color-scheme:light;--bg:#f5f7fb;--panel:rgba(255,255,255,.9);--line:rgba(24,32,51,.1);--text:#182033;--muted:#6c7586;--soft:#edf2f8;--accent:#376fe8;--shadow:0 18px 60px rgba(24,32,51,.12)}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{background:radial-gradient(circle at 10% 0,#fff 0,#f6f8fb 44%,#edf2f7 100%);color:var(--text);font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;overflow:hidden}.app{height:100%;display:grid;grid-template-rows:1fr auto}.topbar{min-height:54px;display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--line);background:rgba(255,255,255,.78);backdrop-filter:blur(18px);position:relative;z-index:20}.brand{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,#86aef9,#d9e5ff);box-shadow:0 0 0 4px #edf3ff}.title{min-width:0;flex:1}.title strong,.title small{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.title strong{font-size:13px}.title small{font-size:11px;color:var(--muted)}.badge{font-size:11px;color:#46536a;background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:4px 8px}.actions{display:flex;align-items:center;gap:7px}.button,.icon-button{appearance:none;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:10px;min-height:32px;padding:0 11px;font:inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.button:hover,.icon-button:hover,.menu button:hover{background:#f7f9fd;border-color:#b8c9ec}.button.primary{background:var(--accent);border-color:var(--accent);color:white}.icon-button{width:34px;padding:0;font-size:18px}.main{min-height:0;overflow:auto}.stage{min-height:100%;display:grid;place-items:center;padding:22px}.media-stage{align-items:start}.note{max-width:620px;text-align:center;color:var(--muted);padding:34px}.note strong{display:block;color:var(--text);font-size:16px;margin-bottom:8px}.folder-shell{max-width:1180px;margin:0 auto;padding:18px}.crumbs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:var(--muted);margin-bottom:14px}.crumbs a{color:var(--accent);text-decoration:none}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:10px}.cell{min-width:0;display:grid;grid-template-columns:38px 1fr;align-items:center;gap:10px;padding:13px;border:1px solid var(--line);border-radius:15px;background:var(--panel);box-shadow:0 4px 18px rgba(24,32,51,.045);text-decoration:none;color:var(--text)}.cell:hover{border-color:#b8c9ec;background:#fff}.cell-icon{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;background:var(--soft);font-size:19px}.cell-copy{min-width:0}.cell strong,.cell small{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.cell strong{font-size:12.5px}.cell small{font-size:11px;color:var(--muted);margin-top:2px}.image-viewer{display:block;max-width:100%;max-height:calc(100vh - 74px);object-fit:contain;border-radius:16px;box-shadow:var(--shadow);transition:transform .16s ease}.media-card{width:min(920px,calc(100vw - 44px));display:grid;gap:16px;padding:22px;border:1px solid var(--line);border-radius:22px;background:var(--panel);box-shadow:var(--shadow)}.media-card video{display:block;width:100%;max-height:calc(100vh - 98px);border-radius:14px;background:#0e1625}.media-card audio{width:100%}.wave{width:100%;height:130px;border:1px solid var(--line);border-radius:15px;background:linear-gradient(#fbfdff,#eff4fa)}.media-facts{position:fixed;top:8px;right:8px;z-index:19;max-width:calc(100vw - 16px);padding:3px 6px;border-radius:6px;background:rgba(0,0,0,.5);color:#fff;font:600 9px/1.25 ui-sans-serif,system-ui,sans-serif;white-space:normal;text-align:right;pointer-events:none}.editor-shell{width:min(1200px,calc(100vw - 32px));height:calc(100vh - 70px);display:grid;grid-template-rows:auto 1fr;border:1px solid var(--line);border-radius:18px;background:var(--panel);box-shadow:var(--shadow);overflow:hidden}.editor-toolbar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line)}.editor-status{margin-left:auto;color:var(--muted);font-size:12px}.editor{width:100%;height:100%;border:0;outline:0;resize:none;padding:18px;background:#fbfcff;color:#172033;font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;tab-size:2;white-space:pre}.frame{width:100%;height:100%;border:0;background:white}.document-shell{width:min(1100px,calc(100vw - 36px));height:calc(100vh - 76px);overflow:auto;padding:24px;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow)}.document-shell article{max-width:760px;margin:auto}.model-host{width:calc(100vw - 34px);height:calc(100vh - 72px);border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#edf2f8;box-shadow:var(--shadow)}.model-host canvas{display:block;width:100%;height:100%}.menu{position:fixed;right:12px;bottom:49px;width:218px;display:grid;gap:4px;padding:8px;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow);z-index:30}.menu[hidden],.convert-panel[hidden]{display:none}.menu button{border:0;background:#fff;border-radius:9px;text-align:left;padding:9px 10px;color:var(--text);font:inherit;cursor:pointer}.convert-panel{position:fixed;right:16px;bottom:64px;width:min(370px,calc(100vw - 32px));display:grid;gap:12px;padding:15px;border:1px solid var(--line);border-radius:17px;background:#fff;box-shadow:var(--shadow);z-index:40}.convert-panel h2{font-size:14px;margin:0}.convert-panel label{display:grid;gap:5px;color:var(--muted);font-size:12px}.convert-panel input,.convert-panel select{height:35px;border:1px solid var(--line);border-radius:10px;background:#fbfcff;color:var(--text);padding:0 10px}.convert-actions{display:flex;justify-content:flex-end;gap:8px}.status{font-size:12px;color:var(--muted);overflow-wrap:anywhere}.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);padding:9px 15px;border-radius:999px;background:#182033;color:#fff;box-shadow:var(--shadow);z-index:60}.image-tools{position:fixed;left:50%;bottom:72px;transform:translateX(-50%);display:flex;gap:7px;padding:7px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);box-shadow:var(--shadow)}@media(max-width:700px){.badge{display:none}.title small{max-width:42vw}.stage{padding:10px}.folder-shell{padding:12px}.grid{grid-template-columns:1fr 1fr}.button{padding:0 9px}.actions .download{display:none}}@media(max-height:360px){.topbar{min-height:44px;padding:5px 8px}.brand{display:none}.title strong{font-size:11px}.title small{font-size:9px}.actions{gap:4px}.button,.icon-button{min-height:28px;padding:0 7px}.icon-button{width:29px}.media-stage{padding:0;align-items:start}.media-card{width:100%;padding:0;border:0;border-radius:0;gap:4px;box-shadow:none}.media-card video{max-height:calc(100vh - 44px);border-radius:0}.wave{height:calc(100vh - 102px);border-radius:0}.model-host,.document-shell,.editor-shell{width:100%;height:calc(100vh - 44px);border:0;border-radius:0;box-shadow:none}.stage:has(.model-host),.stage:has(.document-shell),.stage:has(.editor-shell){padding:0;place-items:start stretch}}
.compact-media .app{grid-template-rows:1fr}.compact-media .topbar{display:none}.compact-media .media-title{display:none}.compact-media .stage{padding:0}.compact-media .media-card{width:100%;height:100%;padding:0;border:0;border-radius:0;box-shadow:none}.compact-media .media-card video{max-height:100%;height:100%;border-radius:0;object-fit:contain}
</style>
</head>
<body>
<div class="app">
<main class="main" id="main"><div class="note">Loading…</div></main>
<header class="topbar">
  <i class="brand"></i>
  <div class="title"><strong id="title">Files</strong><small id="path"></small></div>
  <span class="badge" id="kind">folder</span>
  <div class="actions" id="actions"></div>
</header>
</div>
<script type="module">
const query = new URLSearchParams(location.search);
const legacyFile = query.get('file');
const decodePath = (pathname) => pathname.split('/').map((part) => decodeURIComponent(part)).join('/');
const filePath = (legacyFile || decodePath(location.pathname)).replace(/^\/+/, '');
const mode = query.has('edit') ? 'edit' : 'view';
const autoplay = query.has('autoplay');
const compact = query.has('compact');
const main = document.getElementById('main');
const titleEl = document.getElementById('title');
const pathEl = document.getElementById('path');
const kindEl = document.getElementById('kind');
const actionsEl = document.getElementById('actions');
const esc = (value) => String(value ?? '').replace(/[&<>"']/g,(char)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
const encodePath = (path) => '/' + String(path || '').replace(/^\/+/, '').split('/').filter(Boolean).map(encodeURIComponent).join('/');
const rawUrl = (path = filePath) => encodePath(path);
const appUrl = (path, nextMode = '') => encodePath(path) + (nextMode ? '?' + nextMode + '=1' : '');
const baseName = (path = filePath) => path.split('/').pop() || 'Files';
const extension = (path = filePath) => { const name = baseName(path); return name.includes('.') ? name.split('.').pop().toLowerCase() : ''; };
const parentPath = (path = filePath) => path.split('/').filter(Boolean).slice(0,-1).join('/');
const formatSize = (size) => size >= 1073741824 ? (size/1073741824).toFixed(1)+' GB' : size >= 1048576 ? (size/1048576).toFixed(1)+' MB' : size >= 1024 ? Math.round(size/1024)+' KB' : size+' B';
const formatSizeCompact = (size) => formatSize(size).replace(' ','');
const formatVideoBitrate = (kbps) => {const mbps=Number(kbps)/1000;return (mbps>=10?Math.round(mbps):mbps.toFixed(1).replace(/\.0$/,''))+'mbps';};
function estimatedBitrate(size,duration){const bytes=Number(size),seconds=Number(duration);return bytes>0&&seconds>0?Math.round(bytes*8/seconds/1000):0;}
function showMediaFacts(metadata={},details={}){
  let overlay=document.getElementById('media-facts');
  if(!overlay){overlay=document.createElement('div');overlay.id='media-facts';overlay.className='media-facts';overlay.setAttribute('role','status');document.body.appendChild(overlay);}
  const facts=[];const size=Number(metadata.size);
  if(Number.isFinite(size)&&size>=0)facts.push(formatSizeCompact(size));
  if(details.width>0&&details.height>0)facts.push(Math.round(details.width)+'x'+Math.round(details.height));
  if(details.bitrateKbps>0){if(details.kind==='video')facts.push(formatVideoBitrate(details.bitrateKbps));else if(details.kind==='audio')facts.push(Math.round(details.bitrateKbps)+'kbps');}
  overlay.textContent=facts.join('\u00a0\u00a0');overlay.hidden=!facts.length;
}
const kinds = {
  image:['png','jpg','jpeg','webp','gif','bmp','svg','avif','ico','tif','tiff'],
  audio:['mp3','m4a','wav','wave','ogg','oga','flac','aac','opus'],
  video:['mp4','mov','webm','mkv','m4v','avi'],
  pdf:['pdf'], document:['docx','doc','rtf','odt'],
  model:['glb','gltf','obj','stl','ply','3mf','blend','step','stp','iges','igs'],
  html:['html','htm'],
  text:['txt','md','markdown','json','jsonl','js','mjs','cjs','jsx','ts','tsx','rs','toml','yaml','yml','css','scss','sass','less','sh','bash','zsh','fish','py','xml','csv','tsv','log','ini','conf','env','c','h','cpp','hpp','go','java','rb','php','sql','vue','svelte','lock','gitignore']
};
function inferredKind(path, metadata={}){
  if(metadata.isDirectory) return 'directory';
  const ext=extension(path); const mime=String(metadata.mime||'').toLowerCase();
  if(mime.startsWith('image/')) return 'image'; if(mime.startsWith('audio/')) return 'audio'; if(mime.startsWith('video/')) return 'video';
  if(mime==='application/pdf') return 'pdf';
  return Object.keys(kinds).find((key)=>kinds[key].includes(ext)) || metadata.kind || 'file';
}
function toast(message){ const node=document.createElement('div'); node.className='toast'; node.textContent=message; document.body.appendChild(node); setTimeout(()=>node.remove(),2600); }
async function apiJson(url, options){ const response=await fetch(url,options); const data=await response.json().catch(()=>({})); if(!response.ok||data.error) throw new Error(data.error||'Request failed.'); return data; }
function setActions(items=[]){
  actionsEl.innerHTML='';
  for(const item of items){
    const node=document.createElement(item.href?'a':'button'); node.className=item.icon?'icon-button':'button'+(item.primary?' primary':'')+(item.download?' download':''); node.textContent=item.label;
    if(item.href){node.href=item.href;if(item.download)node.download=item.download;}else{node.type='button';node.addEventListener('click',item.onClick);}
    actionsEl.appendChild(node);
  }
}
function baseFileActions(kind){
  const items=[]; const parent=parentPath();
  items.push({label:'Folder',href:appUrl(parent)});
  items.push(mode==='edit'?{label:'View',href:appUrl(filePath,'view')}:{label:'Edit',href:appUrl(filePath,'edit')});
  items.push({label:'Download',href:rawUrl(),download:baseName()});
  if(['image','audio','video'].includes(kind)) items.push({label:'⋯',icon:true,onClick:()=>toggleConvertMenu(kind)});
  return items;
}
function crumbs(path){
  const parts=path.split('/').filter(Boolean); let acc=''; const result=['<a href="/">Files</a>'];
  for(const part of parts){acc=acc?acc+'/'+part:part;result.push('<span>/</span><a href="'+appUrl(acc)+'">'+esc(part)+'</a>');}
  return result.join('');
}
async function renderFolder(path){
  titleEl.textContent=baseName(path); pathEl.textContent='/'+path; kindEl.textContent='folder'; setActions([]);
  const entries=await apiJson('/api/list?path='+encodeURIComponent(path));
  const icons={directory:'⌑',image:'◇',audio:'♪',video:'▶',text:'≡',html:'⌘',pdf:'▤',document:'▤',model:'⬡',file:'·'};
  const parent=parentPath(path); const rows=[];
  if(path) rows.push('<a class="cell" data-parent="true" href="'+appUrl(parent)+'"><span class="cell-icon">↰</span><span class="cell-copy"><strong>..</strong><small>Upper folder</small></span></a>');
  for(const entry of entries){
    const full=path?path+'/'+entry.name:entry.name; const folder=entry.kind==='directory'; const target=folder?appUrl(full):appUrl(full,'view');
    rows.push('<a class="cell" data-kind="'+esc(entry.kind)+'" href="'+target+'"><span class="cell-icon">'+(icons[entry.kind]||icons.file)+'</span><span class="cell-copy"><strong>'+esc(entry.name)+'</strong><small>'+(folder?'Folder':formatSize(entry.size))+'</small></span></a>');
  }
  main.innerHTML='<section class="folder-shell"><nav class="crumbs">'+crumbs(path)+'</nav><div class="grid">'+(rows.join('')||'<div class="note">This folder is empty.</div>')+'</div></section>';
}
async function renderText(){
  const content=await fetch(rawUrl()).then((response)=>{if(!response.ok)throw new Error('Could not read the file.');return response.text();});
  if(mode!=='edit'){
    main.innerHTML='<div class="stage" style="place-items:start"><pre class="document-shell" style="margin:0;white-space:pre-wrap;font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace">'+esc(content)+'</pre></div>';
    return;
  }
  main.innerHTML='<div class="stage"><section class="editor-shell"><div class="editor-toolbar"><button class="button primary" id="save">Save</button><span class="editor-status" id="status">Editable text</span></div><textarea class="editor" id="editor" spellcheck="false"></textarea></section></div>';
  const editor=document.getElementById('editor'); editor.value=content;
  const save=async()=>{const status=document.getElementById('status');status.textContent='Saving…';try{await apiJson('/api/save?file='+encodeURIComponent(filePath),{method:'POST',body:editor.value});status.textContent='Saved';toast('Saved '+baseName());}catch(error){status.textContent=error.message;}};
  document.getElementById('save').addEventListener('click',save);
  document.addEventListener('keydown',(event)=>{if((event.metaKey||event.ctrlKey)&&event.key.toLowerCase()==='s'){event.preventDefault();save();}});
}
function imageTransformEditor(image){
  let rotation=0,flip=1; const apply=()=>{image.style.transform='rotate('+rotation+'deg) scaleX('+flip+')';};
  const tools=document.createElement('div');tools.className='image-tools';tools.innerHTML='<button class="button" data-action="left">Rotate left</button><button class="button" data-action="right">Rotate right</button><button class="button" data-action="flip">Flip</button><button class="button primary" data-action="save">Save copy</button>';document.body.appendChild(tools);
  tools.addEventListener('click',async(event)=>{const action=event.target.dataset.action;if(!action)return;if(action==='left')rotation=(rotation+270)%360;if(action==='right')rotation=(rotation+90)%360;if(action==='flip')flip*=-1;apply();if(action==='save'){try{const bitmap=await loadCanvasImage();const width=bitmap.naturalWidth||bitmap.width,height=bitmap.naturalHeight||bitmap.height;const rotated=rotation%180!==0;const canvas=document.createElement('canvas');canvas.width=rotated?height:width;canvas.height=rotated?width:height;const context=canvas.getContext('2d');context.translate(canvas.width/2,canvas.height/2);context.rotate(rotation*Math.PI/180);context.scale(flip,1);context.drawImage(bitmap,-width/2,-height/2,width,height);const b64=canvas.toDataURL('image/png').split(',')[1];const target=(parentPath()?parentPath()+'/':'')+baseName().replace(/\.[^.]+$/,'')+'-edited.png';await apiJson('/api/save-b64?file='+encodeURIComponent(target),{method:'POST',body:b64});toast('Saved '+baseName(target));}catch(error){toast(error.message);}}});
}
function loadCanvasImage(){return new Promise((resolve,reject)=>{const image=new Image();let settled=false;const finish=(callback,value)=>{if(settled)return;settled=true;callback(value);};image.onload=()=>finish(resolve,image);image.onerror=()=>finish(reject,new Error('The source image could not be decoded.'));image.src=rawUrl();if(image.complete&&image.naturalWidth)finish(resolve,image);});}
function renderImage(metadata={}){ main.innerHTML='<div class="stage"><img id="image" class="image-viewer" src="'+rawUrl()+'" alt="'+esc(baseName())+'"></div>';const image=document.getElementById('image');showMediaFacts(metadata);image.addEventListener('load',()=>showMediaFacts(metadata,{width:image.naturalWidth,height:image.naturalHeight}),{once:true});if(mode==='edit')imageTransformEditor(image); }
function drawWave(canvas,progress=0){const ratio=devicePixelRatio||1,width=canvas.clientWidth||760,height=canvas.clientHeight||130;canvas.width=width*ratio;canvas.height=height*ratio;const context=canvas.getContext('2d');context.setTransform(ratio,0,0,ratio,0,0);context.clearRect(0,0,width,height);for(let i=0;i<96;i++){const x=i*width/96+2;const h=12+Math.abs(Math.sin(i*.43))*78+Math.abs(Math.cos(i*.17))*18;context.fillStyle=i/96<=progress?'rgba(55,111,232,.75)':'rgba(142,160,192,.35)';context.fillRect(x,(height-h)/2,Math.max(2,width/96-3),h);}}
function renderMedia(tag,metadata={}){
  const autoplayAttribute=autoplay?' autoplay':'';
  const content=tag==='audio'?'<audio id="media" controls preload="metadata"'+autoplayAttribute+' src="'+rawUrl()+'"></audio><canvas id="wave" class="wave"></canvas>':'<video id="media" controls playsinline preload="metadata"'+autoplayAttribute+' src="'+rawUrl()+'"></video>';
  main.innerHTML='<div class="stage media-stage"><section class="media-card">'+content+'</section></div>';
  const player=document.getElementById('media');
  const refreshFacts=()=>showMediaFacts(metadata,{kind:tag,width:tag==='video'?player.videoWidth:0,height:tag==='video'?player.videoHeight:0,bitrateKbps:estimatedBitrate(metadata.size,player.duration)});
  showMediaFacts(metadata);player.addEventListener('loadedmetadata',refreshFacts);
  if(autoplay){const start=()=>{try{player.play()?.catch(()=>{});}catch{}};player.addEventListener('canplay',start,{once:true});start();}
  if(tag==='audio'){const canvas=document.getElementById('wave');const refresh=()=>drawWave(canvas,player.duration?player.currentTime/player.duration:0);player.addEventListener('timeupdate',refresh);player.addEventListener('loadedmetadata',refresh);canvas.addEventListener('click',(event)=>{if(player.duration)player.currentTime=(event.offsetX/canvas.clientWidth)*player.duration;});addEventListener('resize',refresh);refresh();}
}
function renderPdf(){main.innerHTML='<iframe class="frame" src="'+rawUrl()+'" title="PDF"></iframe>';}
async function renderDocument(){
  if(extension()!=='docx'){renderFallback();return;}
  main.innerHTML='<div class="stage"><section class="document-shell"><article id="document">Loading document…</article></section></div>';
  try{await new Promise((resolve,reject)=>{const script=document.createElement('script');script.src='https://cdn.jsdelivr.net/npm/mammoth@1.9.1/mammoth.browser.min.js';script.onload=resolve;script.onerror=reject;document.head.appendChild(script);});const buffer=await fetch(rawUrl()).then(r=>r.arrayBuffer());const result=await window.mammoth.convertToHtml({arrayBuffer:buffer});document.getElementById('document').innerHTML=result.value||'<p>No document content.</p>';}catch(error){document.getElementById('document').textContent='Could not preview this document: '+error.message;}
}
const htmlFeaturePolicy='accelerometer; autoplay; camera; clipboard-read; clipboard-write; display-capture; encrypted-media; fullscreen; geolocation; gyroscope; hid; magnetometer; microphone; midi; payment; picture-in-picture; publickey-credentials-get; screen-wake-lock; serial; usb; web-share; xr-spatial-tracking';
function renderHtml(){ if(mode==='edit'){renderText();return;} main.innerHTML='<iframe class="frame" src="'+rawUrl()+'" title="HTML preview" allow="'+htmlFeaturePolicy+'" allowfullscreen></iframe>'; }
async function renderModel(){
  if(['step','stp','iges','igs'].includes(extension())){renderFallback('This CAD model needs conversion to GLB, glTF, STL, OBJ, PLY, or 3MF before browser preview.');return;}
  main.innerHTML='<div class="stage"><div id="model" class="model-host"></div></div>';
  try{const {THREE,OrbitControls,GLTFLoader,OBJLoader,STLLoader,PLYLoader,ThreeMFLoader}=await import("/three-viewer.js");const host=document.getElementById('model');const scene=new THREE.Scene();scene.background=new THREE.Color(0xedf2f8);const camera=new THREE.PerspectiveCamera(45,1,.01,100000);const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));host.appendChild(renderer.domElement);const controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;scene.add(new THREE.HemisphereLight(0xffffff,0x71809c,2.2));const sun=new THREE.DirectionalLight(0xffffff,3);sun.position.set(4,7,5);scene.add(sun);const ext=extension();const loaderExt=ext==='blend'?'glb':ext;const modelUrl=ext==='blend'?'/api/blend-preview?file='+encodeURIComponent(filePath):rawUrl();const Loader=['glb','gltf'].includes(loaderExt)?GLTFLoader:loaderExt==='obj'?OBJLoader:loaderExt==='stl'?STLLoader:loaderExt==='ply'?PLYLoader:ThreeMFLoader;const loaded=await new Loader().loadAsync(modelUrl);let model=loaded.scene||loaded;if(loaded.isBufferGeometry){loaded.computeVertexNormals?.();model=new THREE.Mesh(loaded,new THREE.MeshStandardMaterial({color:0x91aef4,roughness:.55}));}scene.add(model);const box=new THREE.Box3().setFromObject(model),center=box.getCenter(new THREE.Vector3()),size=Math.max(.01,box.getSize(new THREE.Vector3()).length());controls.target.copy(center);camera.position.copy(center).add(new THREE.Vector3(size*.7,size*.45,size*.7));const resize=()=>{const w=host.clientWidth||800,h=host.clientHeight||600;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();};new ResizeObserver(resize).observe(host);resize();renderer.setAnimationLoop(()=>{controls.update();renderer.render(scene,camera);});}catch(error){renderFallback('Could not render this 3D model: '+error.message);}
}
function renderFallback(message='The browser has no specialized preview for this format.'){
  main.innerHTML='<div class="stage"><section class="note"><strong>'+esc(baseName())+'</strong><p>'+esc(message)+'</p><p><a class="button" href="'+rawUrl()+'">Open raw file</a> <a class="button" href="'+rawUrl()+'" download="'+esc(baseName())+'">Download</a></p><object data="'+rawUrl()+'" style="width:min(900px,80vw);height:55vh"></object></section></div>';
}
function conversionFormats(kind){return kind==='image'?[['png','Convert to PNG'],['jpg','Convert to JPG'],['webp','Convert to WebP']]:kind==='audio'?[['wav','Convert to WAV'],['m4a','Convert to M4A'],['mp3','Convert to MP3'],['mp4_h264','Convert to MP4']]:[['mp4_h264','Convert to MP4'],['mp3','Convert to MP3'],['wav','Convert to WAV'],['m4a','Convert to M4A']];}
function toggleConvertMenu(kind){let menu=document.getElementById('convert-menu');if(menu){menu.remove();return;}menu=document.createElement('div');menu.id='convert-menu';menu.className='menu';menu.innerHTML=conversionFormats(kind).map(([format,label])=>'<button data-format="'+format+'">'+label+'</button>').join('');document.body.appendChild(menu);menu.addEventListener('click',(event)=>{const button=event.target.closest('[data-format]');if(!button)return;menu.remove();showConvertPanel(kind,button.dataset.format);});}
function storedBitrate(){const value=Number(localStorage.getItem('auri-convert-bitrate'));return Number.isFinite(value)&&value>=32?value:4000;}
function convertedExtension(format){return format==='mp4_h264'?'mp4':format;}
function convertedName(format){return 'converted_'+baseName().replace(/\.[^.]+$/,'')+'.'+convertedExtension(format);}
async function convertImage(format,name){const image=await loadCanvasImage();const width=image.naturalWidth||image.width,height=image.naturalHeight||image.height;const canvas=document.createElement('canvas');canvas.width=width;canvas.height=height;canvas.getContext('2d').drawImage(image,0,0,width,height);const mime=format==='jpg'?'image/jpeg':'image/'+format;const blob=await new Promise((resolve,reject)=>canvas.toBlob(value=>value?resolve(value):reject(new Error('Image conversion failed.')),mime,.92));const b64=await new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(String(reader.result).split(',')[1]);reader.onerror=reject;reader.readAsDataURL(blob);});const target=(parentPath()?parentPath()+'/':'')+name;await apiJson('/api/save-b64?file='+encodeURIComponent(target),{method:'POST',body:b64});return {path:'/'+target,name};}
function showConvertPanel(kind,format){
  document.getElementById('convert-panel')?.remove();const panel=document.createElement('section');panel.id='convert-panel';panel.className='convert-panel';const bitrate=storedBitrate();panel.innerHTML='<h2>Convert to '+esc(convertedExtension(format).toUpperCase())+'</h2><label>Output name<input id="convert-name" value="'+esc(convertedName(format))+'"></label>'+(kind==='image'?'':'<label>Bitrate<select id="convert-bitrate"><option value="128">128 kbps</option><option value="320">320 kbps</option><option value="1000">1 Mbps</option><option value="2500">2.5 Mbps</option><option value="4000">4 Mbps</option><option value="8000">8 Mbps</option><option value="12000">12 Mbps</option></select></label><label><span>Default bitrate is saved for future conversions.</span></label>')+'<div class="status" id="convert-status">Ready</div><div class="convert-actions"><button class="button" id="convert-cancel">Cancel</button><button class="button primary" id="convert-start">Convert</button></div>';document.body.appendChild(panel);
  const bitrateEl=document.getElementById('convert-bitrate');if(bitrateEl){if([...bitrateEl.options].some(o=>Number(o.value)===bitrate))bitrateEl.value=String(bitrate);else{const option=new Option((bitrate/1000).toFixed(1)+' Mbps',String(bitrate));bitrateEl.add(option);bitrateEl.value=String(bitrate);}bitrateEl.addEventListener('change',()=>localStorage.setItem('auri-convert-bitrate',bitrateEl.value));}
  document.getElementById('convert-cancel').addEventListener('click',()=>panel.remove());document.getElementById('convert-start').addEventListener('click',async()=>{const button=document.getElementById('convert-start'),status=document.getElementById('convert-status'),name=document.getElementById('convert-name').value.trim()||convertedName(format);button.disabled=true;status.textContent='Converting…';try{let result;if(kind==='image')result=await convertImage(format,name);else{const selected=Number(bitrateEl.value)||4000;localStorage.setItem('auri-convert-bitrate',String(selected));const url='/api/convert?file='+encodeURIComponent(filePath)+'&format='+encodeURIComponent(format)+'&bitrateKbps='+selected+'&resolution=native&name='+encodeURIComponent(name);result=await apiJson(url,{method:'POST'});}status.innerHTML='Saved <a href="'+appUrl(String(result.path||'').replace(/^\/+/,''),'view')+'">'+esc(result.name||name)+'</a>';toast('Conversion complete');}catch(error){status.textContent=error.message;button.disabled=false;}});
}
async function boot(){
  try{const metadata=await apiJson('/api/meta?path='+encodeURIComponent(filePath));const kind=inferredKind(filePath,metadata);document.body.classList.toggle('compact-media',compact&&['audio','video'].includes(kind));titleEl.textContent=metadata.name||baseName();pathEl.textContent='/'+filePath;kindEl.textContent=kind;document.title=(metadata.name||'Files')+' — Auri Files';if(metadata.isDirectory){await renderFolder(filePath);return;}setActions(baseFileActions(kind));showMediaFacts(metadata);if(kind==='text')await renderText();else if(kind==='html')renderHtml();else if(kind==='image')renderImage(metadata);else if(kind==='audio')renderMedia('audio',metadata);else if(kind==='video')renderMedia('video',metadata);else if(kind==='pdf')renderPdf();else if(kind==='document')await renderDocument();else if(kind==='model')await renderModel();else renderFallback();}catch(error){main.innerHTML='<div class="note"><strong>Could not open this path</strong><p>'+esc(error.message)+'</p></div>';}
}
boot();
</script>
